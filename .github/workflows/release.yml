name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SIGNING_CERTIFICATE_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
      SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: ${{ github.ref_name }}"
          }
          "CRABDESK_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate release configuration
        shell: pwsh
        run: |
          .\build\assert-release-configuration.ps1 -Version $env:CRABDESK_VERSION

      - name: Restore and test
        shell: pwsh
        run: |
          dotnet restore CrabDesk.sln
          dotnet test CrabDesk.sln -c Release --no-restore

      - name: Publish win-x64
        shell: pwsh
        run: |
          .\build\publish.ps1 `
            -Version $env:CRABDESK_VERSION `
            -GitHubOwner "${{ github.repository_owner }}" `
            -GitHubRepository "${{ github.event.repository.name }}"

      - name: Publish Web payload
        shell: pwsh
        run: |
          .\build\publish.ps1 `
            -PackageKind Web `
            -Version $env:CRABDESK_VERSION `
            -GitHubOwner "${{ github.repository_owner }}" `
            -GitHubRepository "${{ github.event.repository.name }}"

      - name: Publish Web bootstrapper
        shell: pwsh
        run: |
          .\build\publish-bootstrapper.ps1 `
            -Version $env:CRABDESK_VERSION `
            -GitHubOwner "${{ github.repository_owner }}" `
            -GitHubRepository "${{ github.event.repository.name }}"

      - name: Sign application binaries
        if: ${{ env.SIGNING_CERTIFICATE_BASE64 != '' }}
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "CrabDesk-signing.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64))
          $files = @(
            (Get-ChildItem artifacts\publish\win-x64 -Filter *.exe | Select-Object -ExpandProperty FullName)
            (Get-ChildItem artifacts\publish\win-x64-web -Filter *.exe | Select-Object -ExpandProperty FullName)
            (Resolve-Path artifacts\release\CrabDesk-Setup-Web-x64.exe).Path
          )
          .\build\sign-artifacts.ps1 `
            -CertificatePath $certificate `
            -CertificatePassword $env:SIGNING_CERTIFICATE_PASSWORD `
            -Files $files

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          .\build\build-installer.ps1 -Version $env:CRABDESK_VERSION

      - name: Sign installer
        if: ${{ env.SIGNING_CERTIFICATE_BASE64 != '' }}
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "CrabDesk-signing.pfx"
          .\build\sign-artifacts.ps1 `
            -CertificatePath $certificate `
            -CertificatePassword $env:SIGNING_CERTIFICATE_PASSWORD `
            -Files @(
              "artifacts\installer\CrabDesk-Setup-x64.exe",
              "artifacts\release\CrabDesk-Setup-Web-x64.exe"
            )
          Remove-Item -LiteralPath $certificate -Force

      - name: Verify stable release signatures
        if: ${{ !contains(env.CRABDESK_VERSION, '-') }}
        shell: pwsh
        run: |
          $files = @(
            "artifacts\publish\win-x64\CrabDesk.WinUI.exe",
            "artifacts\publish\win-x64\CrabDesk.IconGuard.exe",
            "artifacts\publish\win-x64-web\CrabDesk.WinUI.exe",
            "artifacts\publish\win-x64-web\CrabDesk.IconGuard.exe",
            "artifacts\installer\CrabDesk-Setup-x64.exe",
            "artifacts\release\CrabDesk-Setup-Web-x64.exe"
          )
          $signatures = foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file
            if ($signature.Status -ne "Valid" -or $null -eq $signature.SignerCertificate) {
              throw "Stable release signature is not trusted for ${file}: $($signature.StatusMessage)"
            }
            if ($null -eq $signature.TimeStamperCertificate) {
              throw "Stable release signature does not contain a trusted timestamp: $file"
            }
            $ekuOids = @($signature.SignerCertificate.EnhancedKeyUsageList | ForEach-Object { $_.ObjectId.Value })
            if ($ekuOids -notcontains "1.3.6.1.5.5.7.3.3") {
              throw "Stable release certificate is not valid for code signing: $file"
            }
            Write-Host "$file => $($signature.SignerCertificate.Subject) [$($signature.SignerCertificate.Thumbprint)]"
            $signature
          }
          if (@($signatures.SignerCertificate.Thumbprint | Sort-Object -Unique).Count -ne 1) {
            throw "Stable release artifacts were not signed by the same publisher certificate."
          }

      - name: Package release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory artifacts\release -Force | Out-Null
          Compress-Archive -Path artifacts\publish\win-x64\* `
            -DestinationPath artifacts\release\CrabDesk-portable-win-x64.zip -Force
          Compress-Archive -Path artifacts\publish\win-x64-web\* `
            -DestinationPath artifacts\release\CrabDesk-portable-web-win-x64.zip -Force
          $assets = @(
            "artifacts\installer\CrabDesk-Setup-x64.exe",
            "artifacts\release\CrabDesk-Setup-Web-x64.exe",
            "artifacts\release\CrabDesk-portable-win-x64.zip",
            "artifacts\release\CrabDesk-portable-web-win-x64.zip"
          )
          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset).Hash.ToLowerInvariant()
            "$hash  $([IO.Path]::GetFileName($asset))"
          }
          $lines | Set-Content artifacts\release\SHA256SUMS.txt -Encoding ascii

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $arguments = @(
            "release", "create", "${{ github.ref_name }}",
            "artifacts\installer\CrabDesk-Setup-x64.exe",
            "artifacts\release\CrabDesk-Setup-Web-x64.exe",
            "artifacts\release\CrabDesk-portable-win-x64.zip",
            "artifacts\release\CrabDesk-portable-web-win-x64.zip",
            "artifacts\release\SHA256SUMS.txt",
            "--title", "CrabDesk $env:CRABDESK_VERSION",
            "--verify-tag"
          )
          if ($env:CRABDESK_VERSION -eq "1.0.0") {
            $arguments += @("--notes-file", "docs\releases\v1.0.0.md")
          } else {
            $arguments += "--generate-notes"
          }
          if ($env:CRABDESK_VERSION.Contains("-")) { $arguments += "--prerelease" }
          gh @arguments
